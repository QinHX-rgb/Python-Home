{% extends 'base_foot.html' %}
{% load static from staticfiles %}

{% block head %}
   <script type="text/javascript" src="{% static 'js/jquery-1.12.4.min.js' %}"></script>
   <script type="text/javascript">
      $(function(){
         if ( {{ error_name }} == 1) {
            // 用户名不存在
            $(".user_error").html('用户名不存在').show();
         }

         if ( {{ error_pwd }} == 1) {
            // 密码错误
            $(".pwd_error").html('密码错误').show();
         }
      });
   </script>
{% endblock head %}



{% block header %}
	<div class="login_top clearfix">
		<a href="index.html" class="login_logo"><img src="{% static 'images/logo02.png' %}"></a>
	</div>
{% endblock header %}

{% block body %}
	<div class="login_form_bg">
		<div class="login_form_wrap clearfix">
			<div class="login_banner fl"></div>
			<div class="slogan fl">行万里路 · 读万卷书</div>
			<div class="login_form fr">
				<div class="login_title clearfix">
					<h1>用户登录</h1>
					<a href="/user/register">立即注册</a>
				</div>
				<div class="form_input">
					<form method="post" action="/user/login_handle">
                        {% csrf_token %}
						<input type="text" name="username" class="name_input" placeholder="请输入用户名" value="{{ uname }}">
						<div class="user_error">输入错误</div>
						<input type="password" name="pwd" class="pass_input" placeholder="请输入密码" value="{{ upwd }}">
						<div class="pwd_error">输入错误</div>
                        <input type="text" name="code" class="verify_input" placeholder="请输入验证码">
                        <img class="verify_img" src="/user/verifyCode"/><br/>
                        <div class="code_error" id="code">验证码错误</div>
						<div class="more_input clearfix">
							<input type="checkbox"  name="jizhu" value="1">
							<label>记住用户名</label>
							<a href="#">忘记密码</a>
						</div>
						<input type="submit" name="" value="登录" class="input_submit">
					</form>
				</div>
			</div>
		</div>
	</div>
    <script type="text/javascript">
        var btn = document.getElementById('code');
        if({{ code_error }} == 1) {
             btn.style.display = "block"

          }
    </script>
{% endblock body %}
